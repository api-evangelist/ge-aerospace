description: 'A leading manufacturer of jet engines and aviation systems for commercial and military aircraft. Spun off from General Electric to focus exclusively on aerospace propulsion and services, GE Aerospace also offers software-as-a-service tooling, engine health monitoring (Collaborative Insight), TRUEngine certification, and OnPoint maintenance and support services.'
