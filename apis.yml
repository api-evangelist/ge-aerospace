x-no-public-api: true
x-no-public-api-reason: >-
  GE Aerospace does not publish a public developer portal, OpenAPI specs, or
  general-access partner API documentation. The company offers SaaS, engine
  health monitoring (Collaborative Insight), and OnPoint regional/business
  services to airline and operator customers, but these are delivered through
  customer agreements rather than a self-service API program. The legacy GE
  Predix industrial IoT platform was divested and is not part of the GE
  Aerospace developer surface.
